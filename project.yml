name: CrewPick
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
configs:
  Debug: debug
  Release: release
targets:
  CrewPick:
    type: application
    platform: iOS
    sources:
      - path: Sources/CrewPickCore
      - path: CrewPickApp
    dependencies:
      - target: CrewPickShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.crewpick
        PRODUCT_NAME: CrewPick
        PRODUCT_DISPLAY_NAME: CrewPick
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true
        CODE_SIGN_ENTITLEMENTS: CrewPickApp/CrewPick.entitlements
    info:
      path: CrewPickApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: "$(PRODUCT_DISPLAY_NAME)"
        CFBundleShortVersionString: 1.0.0
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleURLName: com.example.crewpick
            CFBundleURLSchemes: [crewpick]
    scheme:
      testTargets: []
  CrewPickShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: CrewPickShareExtension
      - path: Sources/CrewPickCore/DeepLinks.swift
      - path: Sources/CrewPickCore/SharedImportStore.swift
      - path: Sources/CrewPickCore/URLNormalizer.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.crewpick.share
        PRODUCT_NAME: CrewPickShare
        SKIP_INSTALL: true
        CODE_SIGN_ENTITLEMENTS: CrewPickShareExtension/CrewPickShare.entitlements
    info:
      path: CrewPickShareExtension/Info.plist
      properties:
        CFBundleDisplayName: CrewPick
        CFBundleShortVersionString: 1.0.0
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
